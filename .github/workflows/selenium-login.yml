name: FocusGuard CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  website-e2e-tests:
    name: Website E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache-dependency-path: 'cognitive-shield-os-main/selenium-tests/package-lock.json'

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl

    - name: Install Microsoft Edge
      if: matrix.browser == 'edge'
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common apt-transport-https wget curl
        curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
        sudo install -o root -g root -m 644 microsoft.gpg /etc/apt/trusted.gpg.d/
        sudo sh -c 'echo "deb [arch=amd64] https://packages.microsoft.com/repos/edge stable main" > /etc/apt/sources.list.d/microsoft-edge-dev.list'
        rm microsoft.gpg
        sudo apt-get update
        sudo apt-get install -y microsoft-edge-stable

    - name: Install App Dependencies
      run: |
        cd cognitive-shield-os-main
        npm install

    - name: Install Testing Dependencies
      run: |
        cd cognitive-shield-os-main/selenium-tests
        npm ci || npm install

    - name: Start Development Server
      run: |
        cd cognitive-shield-os-main
        npm run dev -- --port 5173 &
        sleep 12

    - name: Run Selenium E2E Tests
      env:
        CI: true
        BROWSER: ${{ matrix.browser }}
      run: |
        cd cognitive-shield-os-main/selenium-tests
        npx mocha tests/login.test.js --reporter mochawesome --reporter-options reportDir=mochawesome-report,reportFilename=report 2>&1 | tee mocha-run.log

    - name: Generate Excel Report
      if: always()
      run: |
        python generate_selenium_excel_report.py cognitive-shield-os-main/selenium-tests/mochawesome-report/report.json ${{ matrix.browser }} cognitive-shield-os-main/selenium-tests/mochawesome-report/report.xlsx

    - name: Prepare Website E2E Artifacts
      if: always()
      run: |
        mkdir -p website-artifacts
        cp -r cognitive-shield-os-main/selenium-tests/mochawesome-report/* website-artifacts/ || true
        cp cognitive-shield-os-main/selenium-tests/mocha-run.log website-artifacts/ || true
        cp *.png website-artifacts/ || true
        cp cognitive-shield-os-main/selenium-tests/*.png website-artifacts/ || true
        ls -R website-artifacts

    - name: Upload Website E2E Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: website-e2e-${{ matrix.browser }}-artifacts
        path: website-artifacts/
        if-no-files-found: warn

  android-build-and-test:
    name: Android Build & QA
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Configure Gradle JVM for Linux
      run: |
        sed -i '/org.gradle.java.home/d' gradle.properties
        sed -i '/org.gradle.java.installations/d' gradle.properties

    - name: Setup Java JDK 21
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Run Android Lint Checks
      run: ./gradlew lintDebug
      continue-on-error: true

    - name: Run JUnit Tests
      run: ./gradlew testDebugUnitTest

    - name: Run Code Security Checks
      run: |
        python android_security_scanner.py
        python generate_report.py

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Prepare Android Artifacts
      if: always()
      run: |
        mkdir -p android-artifacts/apk
        mkdir -p android-artifacts/lint-reports
        mkdir -p android-artifacts/junit-reports
        mkdir -p android-artifacts/security-reports
        
        # Copy APK
        cp app/build/outputs/apk/debug/app-debug.apk android-artifacts/apk/ || true
        
        # Copy Lint reports
        cp app/build/reports/lint-results-debug.html android-artifacts/lint-reports/ || true
        cp app/build/reports/lint-results-debug.xml android-artifacts/lint-reports/ || true
        
        # Copy JUnit reports
        cp -r app/build/reports/tests/testDebugUnitTest/* android-artifacts/junit-reports/ || true
        
        # Copy Security reports
        cp FocusGuard_Security_Assessment.xlsx android-artifacts/security-reports/ || true
        cp android-security-violations.txt android-artifacts/security-reports/ || true
        
        ls -R android-artifacts

    - name: Upload Android Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: android-app-build-and-reports
        path: android-artifacts/
        if-no-files-found: warn
