name: Selenium E2E Testing Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache-dependency-path: 'cognitive-shield-os-main/selenium-tests/package-lock.json'

    - name: Install Google Chrome and ChromeDriver
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install App Dependencies
      run: |
        cd cognitive-shield-os-main
        npm install

    - name: Install Testing Dependencies
      run: |
        cd cognitive-shield-os-main/selenium-tests
        npm ci || npm install

    - name: Build and Start Production Preview Server
      run: |
        cd cognitive-shield-os-main
        npm run build
        npx vite preview --port 5173 &
        sleep 5

    - name: Run Selenium E2E Tests
      env:
        CI: true
      run: |
        cd cognitive-shield-os-main/selenium-tests
        npm run login
