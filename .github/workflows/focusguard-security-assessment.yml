name: FocusGuard Security Assessment

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-assessment:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install project dependencies
      run: |
        npm install || echo "No package.json found, skipping npm install"
        # Install exceljs for automated report generation
        npm install exceljs

    - name: Build the project
      run: |
        echo "Building the project..."
        npm run build --if-present

    - name: Run unit tests
      run: |
        echo "Running unit tests..."
        npm test --if-present || true

    - name: Run security scans
      run: |
        echo "Running security scans..."
        npm audit --audit-level=high || true

    - name: Generate Reports (300+ Automated Test Cases)
      run: |
        echo "Executing security assessment tests and generating Excel workbook..."
        node scripts/generate_security_assessment.js

    - name: Upload reports as downloadable artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FocusGuard-Security-Assessment
        path: FocusGuard_Security_Assessment.xlsx
